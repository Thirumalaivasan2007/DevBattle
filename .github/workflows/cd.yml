name: Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./${{ matrix.service }}
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/devbattle-${{ matrix.service }}:latest
          ${{ secrets.DOCKER_USERNAME }}/devbattle-${{ matrix.service }}:${{ github.sha }}

  deploy-to-k8s:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Kubectl
      uses: azure/setup-kubectl@v3

    - name: Configure Kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config

    - name: Deploy Manifests
      run: |
        kubectl apply -f k8s/
        kubectl rollout restart deployment core-backend -n devbattle
        kubectl rollout restart deployment frontend -n devbattle
